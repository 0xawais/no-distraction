<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Distraction!</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --container-bg: white;
            --heading-color: #d32f2f;
            --input-border: #ccc;
            --input-bg: white;
            --input-text: #333;
            --btn-primary-bg: #1976d2;
            --btn-primary-hover: #1565c0;
            --btn-danger-bg: #d32f2f;
            --shadow: rgba(0,0,0,0.1);
            --equation-bg: #e3f2fd;
            --equation-color: #1565c0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --container-bg: #1e1e1e;
                --heading-color: #ef5350;
                --input-border: #555;
                --input-bg: #2d2d2d;
                --input-text: #e0e0e0;
                --btn-primary-bg: #1976d2;
                --btn-primary-hover: #1565c0;
                --btn-danger-bg: #ef5350;
                --shadow: rgba(0,0,0,0.5);
                --equation-bg: rgba(25, 118, 210, 0.1);
                --equation-color: #64b5f6;
            }
        }

        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; }
        .container { background: var(--container-bg); padding: 40px; border-radius: 8px; box-shadow: 0 4px 12px var(--shadow); text-align: center; max-width: 400px; width: 100%; transition: background-color 0.3s; }
        h1 { margin-top: 0; color: var(--heading-color); }
        p { font-size: 1.1em; margin-bottom: 20px; }
        .equation-box { font-size: 2em; font-weight: bold; margin: 20px 0; padding: 20px; background: var(--equation-bg); border-radius: 4px; color: var(--equation-color); }
        input[type="number"] { font-size: 1.5em; padding: 10px; width: 100px; text-align: center; border: 2px solid var(--input-border); border-radius: 4px; margin-bottom: 20px; background-color: var(--input-bg); color: var(--input-text); }
        button { background-color: var(--btn-primary-bg); color: white; border: none; padding: 12px 24px; font-size: 1.2em; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: var(--btn-primary-hover); }
        .error { color: var(--btn-danger-bg); margin-top: 10px; min-height: 20px; font-weight: bold; }
        .target-site { font-weight: bold; color: var(--btn-primary-bg); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Site Blocked!</h1>
        <p>Solve this math equation to unlock <span id="site-name" class="target-site">the site</span> for 15 minutes.</p>
        <div id="equation" class="equation-box">Loading...</div>
        <div>
            <label for="answer">x = </label>
            <input type="number" id="answer" autocomplete="off" autofocus>
        </div>
        <button id="submit">Unlock Site</button>
        <div id="error-message" class="error"></div>
    </div>
    <script src="puzzle.js"></script>
</body>
</html>
