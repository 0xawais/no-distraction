<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Distraction! Options</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --container-bg: white;
            --heading-color: #1565c0;
            --border-color: #eee;
            --input-border: #ccc;
            --input-bg: white;
            --input-text: #333;
            --btn-primary-bg: #1976d2;
            --btn-primary-hover: #1565c0;
            --btn-danger-bg: #d32f2f;
            --btn-danger-hover: #b71c1c;
            --shadow: rgba(0,0,0,0.1);
            --modal-overlay: rgba(0,0,0,0.5);
            --equation-bg: #e3f2fd;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --container-bg: #1e1e1e;
                --heading-color: #64b5f6;
                --border-color: #333;
                --input-border: #555;
                --input-bg: #2d2d2d;
                --input-text: #e0e0e0;
                --btn-primary-bg: #1976d2;
                --btn-primary-hover: #1565c0;
                --btn-danger-bg: #d32f2f;
                --btn-danger-hover: #b71c1c;
                --shadow: rgba(0,0,0,0.5);
                --modal-overlay: rgba(0,0,0,0.7);
                --equation-bg: rgba(25, 118, 210, 0.1);
            }
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 600px; margin: 0 auto; padding: 40px 20px; transition: background-color 0.3s, color 0.3s; }
        h1 { color: var(--heading-color); text-align: center; }
        h2 { color: var(--text-color); }
        .container { background: var(--container-bg); padding: 30px; border-radius: 8px; box-shadow: 0 4px 12px var(--shadow); transition: background-color 0.3s; }
        .add-site-container { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="number"] { padding: 10px; font-size: 1em; border: 1px solid var(--input-border); border-radius: 4px; background-color: var(--input-bg); color: var(--input-text); }
        input[type="text"] { flex-grow: 1; }
        input[type="number"] { width: 100px; text-align: center; font-size: 1.2em; }
        button { background-color: var(--btn-primary-bg); color: white; border: none; padding: 10px 20px; font-size: 1em; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: var(--btn-primary-hover); }
        .site-list { list-style: none; padding: 0; margin: 0; }
        .site-list li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border-color); }
        .site-list li:last-child { border-bottom: none; }
        .remove-btn { background-color: var(--btn-danger-bg); padding: 6px 12px; font-size: 0.9em; }
        .remove-btn:hover { background-color: var(--btn-danger-hover); }
        .error { color: var(--btn-danger-bg); margin-bottom: 10px; font-weight: bold; min-height: 20px; }

        /* Modal Styles */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 1; transition: opacity 0.3s; }
        .modal.hidden { display: none; opacity: 0; }
        .modal-content { background: var(--container-bg); padding: 30px; border-radius: 8px; box-shadow: 0 4px 12px var(--shadow); text-align: center; max-width: 400px; width: 90%; }
        .modal-content h2 { margin-top: 0; color: var(--btn-danger-bg); }
        .equation-box { font-size: 2em; font-weight: bold; margin: 20px 0; padding: 20px; background: var(--equation-bg); border-radius: 4px; color: var(--heading-color); }
        .modal-actions { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .cancel-btn { background-color: #757575; }
        .cancel-btn:hover { background-color: #616161; }
        .target-site { font-weight: bold; color: var(--btn-primary-bg); }
        .submit-remove-btn { background-color: var(--btn-danger-bg); }
        .submit-remove-btn:hover { background-color: var(--btn-danger-hover); }
    </style>
</head>
<body>
    <h1>No Distraction! Settings</h1>
    <div class="container">
        <h2>Blocked Sites</h2>
        <p>You must solve a math puzzle to access these sites.</p>
        <div id="error-message" class="error"></div>
        <div class="add-site-container">
            <input type="text" id="new-site" placeholder="e.g., example.com">
            <button id="add-btn">Add</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">Your Block List</h3>
            <button id="lock-all-btn" class="submit-remove-btn" style="padding: 6px 12px; font-size: 0.9em; display: none;">Lock All Unlocked Sites</button>
        </div>

        <ul id="site-list" class="site-list"></ul>
    </div>

    <div id="puzzle-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Solve to Remove</h2>
            <p id="modal-desc">Solve this equation to remove <span id="modal-site-name" class="target-site">the site</span> from your block list.</p>
            <div id="modal-equation" class="equation-box">Loading...</div>
            <div>
                <label for="modal-answer">x = </label>
                <input type="number" id="modal-answer" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="cancel-btn">Cancel</button>
                <button id="modal-submit" class="submit-remove-btn">Submit</button>
            </div>
            <div id="modal-error-message" class="error" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
